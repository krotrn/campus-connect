            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: alertmanager-prod-image
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
