name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/db"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.changes.outputs.app }}
      worker: ${{ steps.changes.outputs.worker }}
      migrator: ${{ steps.changes.outputs.migrator }}
      nginx: ${{ steps.changes.outputs.nginx }}
      docker-base: ${{ steps.changes.outputs.docker-base }}
      node-base: ${{ steps.changes.outputs.node-base }}
      prometheus: ${{ steps.changes.outputs.prometheus }}
      alertmanager: ${{ steps.changes.outputs.alertmanager }}
      grafana: ${{ steps.changes.outputs.grafana }}
      loki: ${{ steps.changes.outputs.loki }}
      promtail: ${{ steps.changes.outputs.promtail }}
      owner: ${{ steps.owner.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase owner
        id: owner
        run: echo "value=${OWNER,,}" >> $GITHUB_OUTPUT
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docker-base:
              - 'Dockerfile'
            node-base:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/**'
            app:
              - 'src/**'
              - 'public/**'
              - 'next.config.*'
              - 'tsconfig*.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'prisma/**'
              - 'prisma.config.ts'
            worker:
              - 'workers/**'
              - 'tsconfig.worker.json'
              - 'prisma/**'
              - 'prisma.config.ts'
            migrator:
              - 'prisma/**'
              - 'prisma.config.ts'
            nginx:
              - 'nginx/**'
            prometheus:
              - 'monitoring/prometheus/**'
            alertmanager:
              - 'monitoring/alertmanager/**'
            grafana:
              - 'monitoring/grafana/**'
            loki:
              - 'monitoring/loki/**'
            promtail:
              - 'monitoring/promtail/**'

  build-app:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.app == 'true' || needs.detect-changes.outputs.node-base == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.detect-changes.outputs.owner }}/campus-connect-app
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runner
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MINIO_BUCKET=${{ secrets.NEXT_PUBLIC_MINIO_BUCKET || 'campus-connect' }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ secrets.NEXT_PUBLIC_MINIO_ENDPOINT || 'http://localhost:9000' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.node-base == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.detect-changes.outputs.owner }}/campus-connect-worker
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: worker-runner
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MINIO_BUCKET=${{ secrets.NEXT_PUBLIC_MINIO_BUCKET || 'campus-connect' }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ secrets.NEXT_PUBLIC_MINIO_ENDPOINT || 'http://localhost:9000' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-migrator:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.migrator == 'true' || needs.detect-changes.outputs.node-base == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.detect-changes.outputs.owner }}/campus-connect-migrator
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: migrator
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MINIO_BUCKET=${{ secrets.NEXT_PUBLIC_MINIO_BUCKET || 'campus-connect' }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ secrets.NEXT_PUBLIC_MINIO_ENDPOINT || 'http://localhost:9000' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.nginx == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.detect-changes.outputs.owner }}/campus-connect-nginx
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: nginx-prod-image
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MINIO_BUCKET=${{ secrets.NEXT_PUBLIC_MINIO_BUCKET || 'campus-connect' }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ secrets.NEXT_PUBLIC_MINIO_ENDPOINT || 'http://localhost:9000' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-prometheus:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.prometheus == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.detect-changes.outputs.owner }}/campus-connect-prometheus
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: prometheus-prod-image
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-alertmanager:
    needs: [validate, detect-changes]
    if: needs.detect-changes.outputs.alertmanager == 'true' || needs.detect-changes.outputs.docker-base == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
