name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run ESLint
        run: pnpm lint

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runner
            image-name: campus-connect-app
          - target: worker-runner
            image-name: campus-connect-worker
          - target: migrator
            image-name: campus-connect-migrator
          - target: nginx-prod-image
            image-name: campus-connect-nginx
          - target: prometheus-prod-image
            image-name: campus-connect-prometheus
          - target: alertmanager-prod-image
            image-name: campus-connect-alertmanager
          - target: grafana-prod-image
            image-name: campus-connect-grafana
          - target: loki-prod-image
            image-name: campus-connect-loki
          - target: promtail-prod-image
            image-name: campus-connect-promtail

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        id: repository_owner
        run: echo "owner=${OWNER,,}" >> ${GITHUB_OUTPUT}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repository_owner.outputs.owner }}/${{ matrix.image-name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MINIO_BUCKET=${{ secrets.NEXT_PUBLIC_MINIO_BUCKET || 'campus-connect' }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ secrets.NEXT_PUBLIC_MINIO_ENDPOINT || 'http://localhost:9000' }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
